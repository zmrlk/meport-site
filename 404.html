<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Meport</title>
  <meta name="description" content="This page doesn't exist. Return to Meport.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="meport-sygnet.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #050507;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .wrap { max-width: 480px; }
    .code {
      font-size: 6rem;
      font-weight: 800;
      letter-spacing: -.06em;
      background: linear-gradient(135deg, #29ef82, #22d4a8, #1ec9c9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; }
    p { color: rgba(255,255,255,.5); margin-bottom: 32px; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 10px 28px;
      background: #22d474;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: .9rem;
      transition: background .2s;
    }
    a:hover { background: #1aba66; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Meport</a>
  </div>
</body>
</html>
